<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Recover Your Stackly Account</title>
    
    <style>
        @font-face {
            font-family: 'Manrope';
            src: url('./fonts.gstatic.com/s/manrope/v20/xn7gYHE41ni1AdIRggexSg.woff2') format('woff2');
            font-weight: 200 800; font-style: normal; font-display: swap;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --brand-dark: #000000;
            --white: #ffffff;
            --text-muted: #666666;
            --border: #e5e5e5;
            --error: #ef4444;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #fafafa;
            color: var(--brand-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-card {
            background: var(--white);
            width: 100%;
            max-width: 480px;
            padding: 48px;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            text-align: center;
        }

        .auth-icon {
            width: 80px; height: 80px; background: #f0f0f0; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 32px; color: var(--brand-dark);
        }

        .auth-header { margin-bottom: 40px; }
        .auth-title { font-size: 2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 12px; }
        .auth-subtitle { color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; }

        .form-group { text-align: left; margin-bottom: 32px; }
        .form-label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; }
        .form-input {
            width: 100%; height: 56px; padding: 0 20px;
            background: #fdfdfd; border: 1.5px solid var(--border);
            border-radius: 16px; font-family: inherit; font-size: 1rem;
            transition: var(--transition);
        }
        .form-input:focus { outline: none; border-color: var(--brand-dark); background: var(--white); }
        .form-input.invalid { border-color: var(--error); }
        .error-msg { color: var(--error); font-size: 0.75rem; font-weight: 600; margin-top: 6px; display: none; }

        .btn-submit {
            width: 100%; height: 56px; background: var(--brand-dark); color: var(--white);
            border-radius: 16px; font-size: 1rem; font-weight: 800; letter-spacing: 1px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: var(--transition); border: 2px solid var(--brand-dark); margin-bottom: 24px;
        }
        .btn-submit:hover {
            background: transparent; color: var(--brand-dark); transform: translateY(-3px); box-shadow: 0 12px 24px rgba(0,0,0,0.1);
        }

        .auth-footer { font-size: 0.9rem; color: var(--text-muted); }
        .auth-footer a { color: var(--brand-dark); font-weight: 800; text-decoration: none; }
        .anim-el { opacity: 0; }
    </style>
</head>
<body>

    <div class="auth-card anim-card">
        <div class="auth-icon anim-el">
            <i data-lucide="key-round" style="width: 32px; height: 32px;"></i>
        </div>

        <div class="auth-header">
            <h1 class="auth-title anim-el">Forgot Password?</h1>
            <p class="auth-subtitle anim-el">Enter your email address and we'll send you instructions to reset your password.</p>
        </div>

        <form id="forgot-form" novalidate>
            <div class="form-group anim-el">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" id="email" placeholder="name@email.com" required>
                <div class="error-msg" id="email-error">Enter a valid email address</div>
            </div>

            <button type="submit" class="btn-submit anim-el">
                <span>Send Reset Link</span>
                <i data-lucide="send" style="width: 20px; height: 20px;"></i>
            </button>
        </form>

        <div class="auth-footer anim-el">
            Remembered your password? <a href="login.html">Back to Login</a>
        </div>
    </div>

    <script src="gsap.min.js"></script>
    <script>
        lucide.createIcons();

        // GSAP Animations
        gsap.from(".anim-card", {
            y: 60, opacity: 0, duration: 1, ease: "power4.out"
        });
        gsap.to(".anim-el", {
            y: 0, opacity: 1, duration: 0.8, stagger: 0.08, ease: "power3.out", delay: 0.3
        });

        const form = document.getElementById('forgot-form');
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email');

            // Reset errors
            email.classList.remove('invalid');
            document.getElementById('email-error').style.display = 'none';

            if (!emailRegex.test(email.value)) {
                email.classList.add('invalid');
                document.getElementById('email-error').style.display = 'block';
            } else {
                // Success - Redirect to 404 as requested
                window.location.href = '404.html';
            }
        });
    </script>
</body>
</html>
