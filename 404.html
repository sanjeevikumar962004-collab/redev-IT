<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Stackly</title>
    
    <style>
        @font-face {
            font-family: 'Manrope';
            src: url('./fonts.gstatic.com/s/manrope/v20/xn7gYHE41ni1AdIRggexSg.woff2') format('woff2');
            font-weight: 200 800; font-style: normal; font-display: swap;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --brand-dark: #000000;
            --white: #ffffff;
            --text-muted: #666666;
            --bg-light: #f5f5f5;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--white);
            color: var(--brand-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        .error-container {
            max-width: 600px;
            padding: 40px;
            z-index: 2;
        }

        .error-code {
            font-size: clamp(8rem, 20vw, 15rem);
            font-weight: 800;
            line-height: .8;
            letter-spacing: -10px;
            margin-bottom: 20px;
            background: linear-gradient(180deg, #000 0%, rgba(0,0,0,0.1) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        .error-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .error-desc {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        /* Premium Button Style (Matching index.html) */
        .btn {
            height: 54px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 40px;
            position: relative;
            background-color: var(--brand-dark);
            cursor: pointer;
            border: 2px solid var(--brand-dark);
            overflow: hidden;
            border-radius: 30px;
            color: var(--white);
            transition: var(--transition);
            text-decoration: none;
            font-weight: 800;
            letter-spacing: 1px;
            font-size: 0.9rem;
            gap: 10px;
        }

        .btn:hover {
            background-color: transparent;
            color: var(--brand-dark);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Abstract Background Elements */
        .blob {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: rgba(0,0,0,0.03);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
        }
        .blob-1 { top: -10%; left: -10%; }
        .blob-2 { bottom: -10%; right: -10%; }

        .line-art {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.1;
            z-index: 0;
        }
    </style>
</head>
<body>

    <!-- ==============================================
         GLOBAL PREMIUM PRELOADER
         ============================================== -->
    <style>
        #global-preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background-color: var(--brand-dark, #000);
            z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s cubic-bezier(0.165, 0.84, 0.44, 1), transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            pointer-events: all;
        }
        body.loaded #global-preloader {
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
        }
        .preloader-content {
            display: flex; flex-direction: column; align-items: center; gap: 24px;
        }
        
        /* Sequence Icons Container */
        .edu-sequence {
            position: relative;
            width: 50px; height: 50px;
        }
        .edu-icon {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            color: var(--white, #fff);
            opacity: 0;
            transform: scale(0.5);
            display: flex; align-items: center; justify-content: center;
        }
        .edu-icon svg { width: 100%; height: 100%; }

        /* Animation Keyframes for Sequence */
        .icon-notes { animation: seq-1 3s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        .icon-book { animation: seq-2 3s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        .icon-hat { animation: seq-3 3s cubic-bezier(0.4, 0, 0.2, 1) infinite; }

        @keyframes seq-1 {
            0%   { opacity: 0; transform: scale(0.5) translateY(10px); }
            10%  { opacity: 1; transform: scale(1) translateY(0); }
            25%  { opacity: 1; transform: scale(1) translateY(0); }
            33%  { opacity: 0; transform: scale(0.5) translateY(-10px); }
            100% { opacity: 0; transform: scale(0.5) translateY(-10px); }
        }
        @keyframes seq-2 {
            0%   { opacity: 0; transform: scale(0.5) translateY(10px); }
            33%  { opacity: 0; transform: scale(0.5) translateY(10px); }
            43%  { opacity: 1; transform: scale(1) translateY(0); }
            58%  { opacity: 1; transform: scale(1) translateY(0); }
            66%  { opacity: 0; transform: scale(0.5) translateY(-10px); }
            100% { opacity: 0; transform: scale(0.5) translateY(-10px); }
        }
        @keyframes seq-3 {
            0%   { opacity: 0; transform: scale(0.5) translateY(10px); }
            66%  { opacity: 0; transform: scale(0.5) translateY(10px); }
            76%  { opacity: 1; transform: scale(1) translateY(0); }
            90%  { opacity: 1; transform: scale(1) translateY(0); }
            100% { opacity: 0; transform: scale(0.5) translateY(-10px); }
        }

        .preloader-progress-container {
            width: 140px; height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px; overflow: hidden;
            position: relative;
        }
        .preloader-progress-bar {
            position: absolute; top: 0; left: 0; height: 100%; width: 0%;
            background: var(--white, #fff);
            animation: load-progress 1.5s ease-out forwards;
        }
        @keyframes load-progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
    </style>
    <div id="global-preloader">
        <div class="preloader-content">
            <div class="edu-sequence">
                <!-- Notes Icon -->
                <div class="edu-icon icon-notes">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>
                </div>
                <!-- Book Icon -->
                <div class="edu-icon icon-book">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                </div>
                <!-- Graduation Hat Icon -->
                <div class="edu-icon icon-hat">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                </div>
            </div>
            <div class="preloader-progress-container">
                <div class="preloader-progress-bar"></div>
            </div>
        </div>
    </div>
    <script>
        // Start tracking time immediately
        const preloaderStartTime = Date.now();
        const minLoadTime = 3000; // Force 3 seconds minimum load time (1 full sequence)

        window.addEventListener('load', function() {
            const timeElapsed = Date.now() - preloaderStartTime;
            const delayRemaining = Math.max(0, minLoadTime - timeElapsed);

            setTimeout(() => {
                document.body.classList.add('loaded');
                setTimeout(() => {
                    const preloader = document.getElementById('global-preloader');
                    if(preloader) preloader.remove();
                }, 600); // Wait for CSS transition
            }, delayRemaining);
        });
    </script>


    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <main class="error-container">
        <div class="error-code anim-split">404</div>
        <h1 class="error-title anim-up">Oops! You've drifted into space.</h1>
        <p class="error-desc anim-up">The page you're looking for was moved, removed, renamed, or might never have existed. Let's get you back on track.</p>
        
        <div class="anim-up">
            <a href="index.html" class="btn">
                <i data-lucide="arrow-left" style="width: 20px; height: 20px;"></i>
                Back to Home
            </a>
        </div>
    </main>

    <script src="gsap.min.js"></script>
    <script>
        lucide.createIcons();

        // GSAP Animations
        gsap.from(".error-code", {
            y: 100,
            opacity: 0,
            duration: 1.2,
            ease: "power4.out",
            delay: 0.2
        });

        gsap.from(".anim-up", {
            y: 40,
            opacity: 0,
            duration: 1,
            stagger: 0.15,
            ease: "power3.out",
            delay: 0.6
        });

        // Interactive blobs
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            gsap.to(".blob-1", {
                x: x * 50,
                y: y * 50,
                duration: 1.5,
                ease: "power2.out"
            });
            
            gsap.to(".blob-2", {
                x: -x * 50,
                y: -y * 50,
                duration: 1.5,
                ease: "power2.out"
            });
        });
    </script>
</body>
</html>
